<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>URL Shortener</title>
</head>
<body>
<h1>URL Shortener</h1>

<form action="/shorten" method="post">
    <input type="text" name="originalUrl" placeholder="Paste your URL here" size="50"/>
    <button type="submit">Shorten</button>
</form>

<p th:if="${shortUrl}">
    Short URL: <a th:href="${shortUrl}" th:text="${shortUrl}"></a>
</p>

</body>
</html>
